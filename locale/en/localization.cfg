[mod-setting-description]
feeds-n-speeds-extras-radars-enable=A smaller radar to keep your factory under surveillance without breaking the bank
feeds-n-speeds-tweaks-electric-enable=Extend the reach of vanilla electric poles just a bit. Now you can have 100x100 city grids with ease.
feeds-n-speeds-tweaks-nuclear-enable=Nuclear reactors no longer aimlessly burn fuel, and heat exchangers and turbines have nice round numbers.
feeds-n-speeds-tweaks-inserter-enable=The yellow inserter is a little slower than the red, which causes strange throughput issues. Also enables burner inserters to leech fuel off furnaces.
feeds-n-speeds-tweaks-ores-enable=Ores will now be infinite and have a percentage richness equal to the richness in the map settings. Oil/fluids no longer depletes either.
feeds-n-speeds-extras-chests-enable=Adds a big 2x2 steel chest variant, which can be useful for various things. (Also shoutout to well-endowed women!)
feeds-n-speeds-tweaks-chests-enable=Rebalance the chests to have somewhat more reasonable size and make the game just a little harder. (Also shoutout to modestly endowed women!)
feeds-n-speeds-tweaks-concrete-enable=Tweak concrete to be more important in the game than it is by default. This setting has interplay with other mod settings.
feeds-n-speeds-tweaks-sensibility-enable=General rebalancing tweaks of lots of different things, mostly to make the game more difficult.

